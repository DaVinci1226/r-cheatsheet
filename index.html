<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>R Reference — Vollständiges Nachschlagewerk</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{--bg:#09090e;--bg2:#0f0f16;--bg3:#141420;--border:#1e1e2e;--border2:#2a2a3e;--text:#c8c8d8;--muted:#55556a;--gold:#c9a84c;--gold2:#e8c96a;--mono:'IBM Plex Mono',monospace;--serif:'Playfair Display',serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--mono);font-size:13px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.header{position:sticky;top:0;z-index:200;background:var(--bg);border-bottom:1px solid var(--border);padding:20px 28px 0}
.header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:16px}
.header-label{font-size:9px;letter-spacing:5px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:4px}
.header-title{font-family:var(--serif);font-size:22px;font-weight:600;color:#fff;letter-spacing:-.3px}
.header-title span{color:var(--gold)}
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none}
.search{background:var(--bg2);border:1px solid var(--border2);color:var(--text);padding:8px 12px 8px 30px;font-family:var(--mono);font-size:12px;width:230px;outline:none;transition:border-color .15s}
.search:focus{border-color:var(--gold)}
.search::placeholder{color:var(--muted)}
.nav{display:flex;gap:0;overflow-x:auto;padding-bottom:0}
.nav::-webkit-scrollbar{height:0}
.nav-btn{padding:8px 14px 10px;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap;transition:all .15s;letter-spacing:.3px}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{font-weight:600}
main{max-width:960px;margin:0 auto;padding:28px 24px 60px}
.section-header{margin-bottom:24px}
.section-title{font-family:var(--serif);font-size:20px;font-weight:600;color:#fff;margin-bottom:4px}
.section-sub{font-size:11px;color:var(--muted);letter-spacing:.3px}
.group{margin-bottom:10px;border:1px solid var(--border)}
.group-header{width:100%;padding:11px 16px;background:var(--bg2);border:none;cursor:pointer;display:flex;justify-content:space-between;align-items:center;text-align:left;transition:background .1s}
.group-header:hover{background:var(--bg3)}
.group-name{font-size:10px;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.group-meta{display:flex;align-items:center;gap:10px}
.group-count{font-size:10px;color:var(--muted)}
.group-arrow{font-size:10px;color:var(--muted);transition:transform .2s;display:inline-block}
.group-arrow.open{transform:rotate(180deg)}
.group-body{border-top:1px solid var(--border)}
.row{display:grid;grid-template-columns:260px 1fr;border-bottom:1px solid var(--border);transition:background .08s}
.row3{grid-template-columns:130px 190px 1fr}
.row:last-child{border-bottom:none}
.row:hover{background:rgba(201,168,76,.04)}
.row-code{padding:8px 16px;font-size:12px;font-weight:500;border-right:1px solid var(--border);word-break:break-all;display:flex;align-items:center}
.row-desc{padding:8px 16px;font-size:12px;color:#9898b0;display:flex;align-items:center;line-height:1.4}
.row-mid{padding:8px 16px;font-size:11px;color:#6a6a80;border-right:1px solid var(--border);display:flex;align-items:center;line-height:1.4}
.example-block{padding:14px 16px;background:#060609;border-top:1px solid var(--border)}
.example-label{font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
pre{font-family:var(--mono);font-size:11px;color:#7ac47a;line-height:1.75;white-space:pre-wrap}
.c{color:var(--muted)}
.tip{padding:12px 16px;background:rgba(201,168,76,.06);border-left:2px solid var(--gold);margin-bottom:10px;font-size:12px;color:#a8a870;line-height:1.6}
.tip strong{color:var(--gold2)}
.tip code{background:rgba(255,255,255,.06);padding:1px 4px;font-family:var(--mono);font-size:11px}
.empty{padding:40px;text-align:center;color:var(--muted);font-size:12px}
footer{max-width:960px;margin:0 auto;padding:0 24px 40px;font-size:10px;color:#2a2a38;letter-spacing:1px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
@media(max-width:600px){.row,.row3{grid-template-columns:1fr}.row-code{border-right:none;border-bottom:1px solid var(--border)}.row-mid{border-right:none;border-bottom:1px solid var(--border)}.header{padding:16px 16px 0}main{padding:20px 16px 40px}}
</style>
</head>

steuerung:{title:"Programmier-Strukturen",sub:"Bedingungen, Schleifen, Funktionen, Fehlerbehandlung",
gruppen:[
{name:"Bedingungen",farbe:"#a87fc4",
beispiel:`stammwuerze <- 14.5

if (stammwuerze > 16) {
  cat("Bockbier\n")
} else if (stammwuerze > 13) {
  cat("Vollbier\n")
} else {
  cat("Schankbier\n")
}

# Vektorisiert — für ganze Spalten:
df$klasse <- ifelse(df$stammwuerze > 13, "Vollbier", "Schankbier")

function esc(s){
  // already-escaped strings (HTML entities) are passed through
  return String(s);
}

function render(){renderNav();renderMain();}

function renderNav(){
  const nav=document.getElementById("nav");
  const sec=S.find(s=>s.id===aktiv);
  document.getElementById("section-accent").textContent="— "+sec.label.replace(/\S+\s/,"");
  document.getElementById("section-accent").style.color=sec.color;
  nav.innerHTML=S.map(s=>`<button class="nav-btn${s.id===aktiv?" active":""}" style="${s.id===aktiv?`color:${s.color};border-bottom-color:${s.color}`:""}" onclick="go('${s.id}')">${s.label}${PROTECTED.includes(s.id)&&!unlocked?' 🔒':''}</button>`).join("");
}

const PROTECTED=["forschung","publikation"];
const PIN_HASH=1509442; // PIN: 1234
let unlocked=false;

function hashPin(s){let h=0;for(let i=0;i<s.length;i++){h=Math.imul(31,h)+s.charCodeAt(i)|0;}return h;}

// So änderst du den PIN: öffne die Browser-Console (F12) und tippe:
// hashPin("DEINPIN")  → die Zahl als PIN_HASH eintragen

function go(id){
  if(PROTECTED.includes(id)&&!unlocked){
    const pin=prompt("🔒 Dieser Bereich ist geschützt.\nPIN eingeben:");
    if(pin===null) return;
    if(hashPin(pin)!==PIN_HASH){
      alert("❌ Falscher PIN.");
      return;
    }
    unlocked=true;
  }
  aktiv=id;suche="";document.getElementById("search").value="";render();window.scrollTo({top:0});
}

document.getElementById("search").addEventListener("input",function(){suche=this.value.toLowerCase();renderMain();});

function tog(k){col[k]=!col[k];renderMain();}

function fi(items){
  if(!suche)return items;
  return items.filter(it=>(it[0]||"").toLowerCase().includes(suche)||(it[it.length-1]||"").toLowerCase().includes(suche));
}

function hl(s){
  return s.split("\n").map(line=>{
    const ci=line.indexOf("#");
    if(ci>-1) return line.substring(0,ci)+'<span class="c">'+line.substring(ci)+'</span>';
    return line;
  }).join("\n");
}

function renderMain(){
  const sec=D[aktiv], sm=S.find(s=>s.id===aktiv);
  let h=`<div class="section-header"><h2 class="section-title" style="color:${sm.color}">${sec.title}</h2><p class="section-sub">${sec.sub}</p></div>`;
  if(sec.tip) h+=`<div class="tip">${sec.tip}</div>`;
  let any=false;
  sec.gruppen.forEach((g,gi)=>{
    const k=`${aktiv}-${gi}`, open=col[k]!==true;
    const items=fi(g.items||[]);
    if(suche&&items.length===0&&!g.beispiel) return;
    any=true;
    const c=g.farbe||sm.color;
    h+=`<div class="group"><button class="group-header" onclick="tog('${k}')"><span class="group-name" style="color:${c}">${g.name}</span><span class="group-meta"><span class="group-count">${items.length}</span><span class="group-arrow${open?" open":""}">▼</span></span></button>`;
    if(open){
      h+=`<div class="group-body">`;
      if(g.tip) h+=`<div class="tip" style="margin:0">${g.tip}</div>`;
      items.forEach(it=>{
        if(it.length===3){
          h+=`<div class="row row3"><div class="row-code" style="color:${c}">${it[0]}</div><div class="row-mid">${it[1]}</div><div class="row-desc">${it[2]}</div></div>`;
        } else {
          h+=`<div class="row"><div class="row-code" style="color:${c}">${it[0]}</div><div class="row-desc">${it[1]}</div></div>`;
        }
      });
      if(g.beispiel) h+=`<div class="example-block"><div class="example-label">Beispiel</div><pre>${hl(g.beispiel)}</pre></div>`;
      h+=`</div>`;
    }
    h+=`</div>`;
  });
  if(!any) h+=`<div class="empty">Keine Ergebnisse für „${suche}"</div>`;
  document.getElementById("main").innerHTML=h;
}

render();
</script>
</body>
</html>
