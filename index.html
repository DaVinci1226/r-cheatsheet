              { zeichen: "wilcox.test(x, y)",         was: "Mann-Whitney-U · nichtparametrisch" },
            ]
          },
          {
            name: "Mehrere Gruppen (ANOVA)", farbe: "#E8C547",
            items: [
              { zeichen: "aov(y ~ gruppe, data=df)",   was: "Einfaktorielle ANOVA" },
              { zeichen: "summary(modell)",            was: "Ergebnis anzeigen · p < 0.05 → Unterschied existiert" },
              { zeichen: "TukeyHSD(modell)",           was: "Post-hoc-Test · welche Paare unterscheiden sich?" },
              { zeichen: "plot(TukeyHSD(modell))",     was: "Tukey-Ergebnis visualisieren" },
              { zeichen: "aov(y ~ A * B, data=df)",    was: "Zweifaktorielle ANOVA (mit Interaktion)" },
              { zeichen: "kruskal.test(y ~ gruppe)",   was: "Kruskal-Wallis · nichtparametrische ANOVA" },
            ]
          },
          {
            name: "Kategoriale Daten", farbe: "#E87A7A",
            items: [
              { zeichen: "chisq.test(table(x, y))",      was: "Chi-Quadrat-Unabhängigkeitstest" },
              { zeichen: "chisq.test(x, p=c(0.5,0.5))", was: "Chi-Quadrat-Anpassungstest" },
              { zeichen: "fisher.test(table(x, y))",     was: "Fischer-Test · bei kleinen Stichproben" },
            ]
          },
          {
            name: "Regression", farbe: "#D4835B",
            items: [
              { zeichen: "lm(y ~ x, data=df)",              was: "Einfache lineare Regression" },
              { zeichen: "lm(y ~ x1 + x2 + x3, data=df)",  was: "Multiple Regression" },
              { zeichen: "summary(modell)",                  was: "Koeffizienten, R², p-Werte anzeigen" },
              { zeichen: "plot(modell)",                     was: "4 Diagnose-Plots (Residuen!)" },
              { zeichen: "predict(modell, newdata=df)",      was: "Vorhersagen treffen" },
              { zeichen: "AIC(modell)",                      was: "Modellgüte vergleichen (kleiner = besser)" },
              { zeichen: "glm(y ~ x, family=binomial)",      was: "Logistische Regression (y = 0/1)" },
              { zeichen: "library(car); vif(modell)",        was: "Multikollinearität · Werte > 10 = Problem!" },
              { zeichen: "step(modell)",                     was: "Schrittweise Variablenauswahl" },
            ]
          },
          {
            name: "p-Wert & Effektgröße", farbe: "#A87FC4",
            items: [
              { zeichen: "p < 0.05",       was: "Signifikant · H₀ ablehnen · *" },
              { zeichen: "p < 0.01",       was: "Sehr signifikant · **" },
              { zeichen: "p < 0.001",      was: "Hochsignifikant · ***" },
              { zeichen: "Cohen's d < 0.2",was: "Kleiner Effekt" },
              { zeichen: "Cohen's d ≈ 0.5",was: "Mittlerer Effekt" },
              { zeichen: "Cohen's d > 0.8",was: "Großer Effekt" },
              { zeichen: "R² (0–1)",       was: "Varianzaufklärung · 0.7 = 70% erklärt" },
              { zeichen: "η² > 0.14",      was: "Großer Effekt bei ANOVA" },
            ]
          }
        ]
      },
      shortcuts: {
        title: "RStudio Shortcuts & Tipps",
        subtitle: "Diese Shortcuts sparen dir täglich 30 Minuten.",
        gruppen: [
          {
            name: "Unverzichtbar — täglich nutzen", farbe: "#F0A050",
            items: [
              { zeichen: "Alt + -",           was: "<- (Zuweisungspfeil) — DER wichtigste Shortcut!" },
              { zeichen: "Strg + Enter",       was: "Aktuelle Zeile/Auswahl ausführen" },
              { zeichen: "Strg + Shift + M",   was: "%>% (Pipe-Operator, tidyverse)" },
              { zeichen: "Tab",                was: "Autocomplete — IMMER nutzen!" },
              { zeichen: "↑ in Console",       was: "Letzten Befehl wiederholen" },
              { zeichen: "Strg + L",           was: "Console leeren" },
              { zeichen: "Esc",                was: "Laufenden Befehl abbrechen" },
              { zeichen: "Strg + Z / Y",       was: "Rückgängig / Wiederherstellen" },
            ]
          },
          {
            name: "Script & Editor", farbe: "#5BC4A0",
            items: [
              { zeichen: "Strg + S",           was: "Script speichern" },
              { zeichen: "Strg + Shift + N",   was: "Neues R-Script" },
              { zeichen: "Strg + A + Enter",   was: "Gesamtes Script ausführen" },
              { zeichen: "Strg + Shift + C",   was: "Zeile auskommentieren (#)" },
              { zeichen: "Strg + F",           was: "Suchen & Ersetzen" },
              { zeichen: "Alt + Shift + K",    was: "Alle Shortcuts anzeigen!" },
              { zeichen: "Strg + 1 / 2",       was: "Fokus: Script / Console" },
            ]
          },
          {
            name: "Pakete & Hilfe", farbe: "#5BA8D4",
            items: [
              { zeichen: "install.packages('x')", was: "Paket installieren (einmal!)" },
              { zeichen: "library(x)",            was: "Paket laden (jede Session!)" },
              { zeichen: "?mean",                 was: "Hilfe zu einer Funktion" },
              { zeichen: "??regression",          was: "Hilfe-Suche nach Thema" },
              { zeichen: "args(mean)",            was: "Argumente einer Funktion" },
            ]
          },
          {
            name: "Wichtige Pakete", farbe: "#E8C547",
            items: [
              { zeichen: "ggplot2",    was: "Professionelle Grafiken" },
              { zeichen: "dplyr",     was: "Daten manipulieren (filter, mutate...)" },
              { zeichen: "tidyr",     was: "Daten umformen" },
              { zeichen: "readxl",    was: "Excel-Dateien einlesen" },
              { zeichen: "car",       was: "Levene-Test, VIF, Diagnostik" },
              { zeichen: "rmarkdown", was: "Reproduzierbare Berichte" },
              { zeichen: "tidyverse", was: "Alles auf einmal: ggplot2 + dplyr + ..." },
            ]
          },
          {
            name: "Fehlermeldungen verstehen", farbe: "#E87A7A",
            items: [
              { zeichen: "Error: object 'x' not found",      was: "Variable nicht definiert → Schreibfehler? Ausgeführt?" },
              { zeichen: "Error: could not find function",    was: "Paket nicht geladen → library() vergessen?" },
              { zeichen: "subscript out of bounds",           was: "Index zu groß → length() prüfen" },
              { zeichen: "NAs introduced by coercion",        was: "Text → Zahl gescheitert" },
              { zeichen: "+ in der Console",                  was: "Befehl unvollständig → Klammer zu? Esc drücken!" },
              { zeichen: "Warning ≠ Error!",                  was: "Warnungen meist okay · Errors müssen behoben werden" },
            ]
          }
        ]
      }
    };

    function App() {
      const [aktiv, setAktiv] = useState("tastatur");
      const [suche, setSuche] = useState("");
      const [aufgeklappt, setAufgeklappt] = useState({});

      const sektion = data[aktiv];
      const aktiveSection = SECTIONS.find(s => s.id === aktiv);

      const toggleGruppe = (idx) => {
        const key = `${aktiv}-${idx}`;
        setAufgeklappt(prev => ({ ...prev, [key]: prev[key] === false ? true : false }));
      };

      const filterItems = (items) => {
        if (!suche) return items;
        const q = suche.toLowerCase();
        return items.filter(item =>
          item.zeichen.toLowerCase().includes(q) ||
          item.was.toLowerCase().includes(q)
        );
      };

      const headerStyle = {
        background: "linear-gradient(180deg,#0f0f0f,#080808)",
        padding: "24px 20px 16px",
        borderBottom: "1px solid #222",
        position: "sticky", top: 0, zIndex: 100,
      };

      return (
        <div style={{ fontFamily:"'Courier New',Courier,monospace", background:"#080808", minHeight:"100vh", color:"#ddd" }}>
          {/* HEADER */}
          <div style={headerStyle}>
            <div style={{ maxWidth:900, margin:"0 auto" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:10 }}>
                <div>
                  <div style={{ fontSize:10, letterSpacing:4, color:"#444", marginBottom:4 }}>HSWT · STATISTIK · BRAU- & GETRÄNKETECHNOLOGIE</div>
                  <h1 style={{ margin:0, fontSize:20, fontWeight:"bold", color:"#fff" }}>
                    R Cheatsheet <span style={{ color: aktiveSection?.color }}>— vollständig</span>
                  </h1>
                </div>
                <input
                  placeholder="Suchen... z.B. mean, t.test"
                  value={suche}
                  onChange={e => setSuche(e.target.value)}
                  style={{
                    background:"#151515", border:"1px solid #333", color:"#ddd",
                    padding:"7px 12px", fontFamily:"'Courier New',monospace",
                    fontSize:12, width:200, outline:"none"
                  }}
                />
              </div>
              <div style={{ display:"flex", gap:4, marginTop:14, flexWrap:"wrap" }}>
                {SECTIONS.map(s => (
                  <button key={s.id} onClick={() => { setAktiv(s.id); setSuche(""); }} style={{
                    padding:"5px 12px",
                    background: aktiv===s.id ? s.color : "#111",
                    color: aktiv===s.id ? "#000" : "#777",
                    border:`1px solid ${aktiv===s.id ? s.color : "#2a2a2a"}`,
                    cursor:"pointer", fontSize:11,
                    fontFamily:"'Courier New',monospace",
                    fontWeight: aktiv===s.id ? "bold" : "normal",
                    whiteSpace:"nowrap",
                  }}>{s.label}</button>
                ))}
              </div>
            </div>
          </div>

          {/* CONTENT */}
          <div style={{ maxWidth:900, margin:"0 auto", padding:20 }}>
            <div style={{ marginBottom:20 }}>
              <h2 style={{ margin:"0 0 4px", fontSize:16, color: aktiveSection?.color }}>{sektion.title}</h2>
              <p style={{ margin:0, color:"#555", fontSize:12 }}>{sektion.subtitle}</p>
            </div>

            {sektion.gruppen.map((gruppe, gi) => {
              const key = `${aktiv}-${gi}`;
              const isOpen = aufgeklappt[key] !== false;
              const filtered = filterItems(gruppe.items);
              if (suche && filtered.length === 0) return null;

              return (
                <div key={gi} style={{ marginBottom:10, border:"1px solid #1e1e1e", background:"#0d0d0d" }}>
                  <button onClick={() => toggleGruppe(gi)} style={{
                    width:"100%", padding:"10px 14px", background:"transparent",
                    border:"none", cursor:"pointer",
                    display:"flex", justifyContent:"space-between", alignItems:"center", textAlign:"left"
                  }}>
                    <span style={{ fontSize:11, color:gruppe.farbe, letterSpacing:1, textTransform:"uppercase", fontWeight:"bold" }}>
                      {gruppe.name}
                      <span style={{ color:"#444", marginLeft:8, fontWeight:"normal" }}>({filtered.length})</span>
                    </span>
                    <span style={{ color:"#444" }}>{isOpen ? "▲" : "▼"}</span>
                  </button>

                  {isOpen && (
                    <div style={{ borderTop:`1px solid ${gruppe.farbe}22` }}>
                      {filtered.map((item, ii) => (
                        <div key={ii}
                          style={{ display:"grid", gridTemplateColumns:"270px 1fr", borderBottom:"1px solid #111" }}
                          onMouseEnter={e => e.currentTarget.style.background="#111"}
                          onMouseLeave={e => e.currentTarget.style.background="transparent"}>
                          <div style={{
                            padding:"8px 14px", fontFamily:"'Courier New',monospace",
                            fontSize:12, color:gruppe.farbe,
                            borderRight:"1px solid #111", wordBreak:"break-all"
                          }}>{item.zeichen}</div>
                          <div style={{ padding:"8px 14px", fontSize:12, color:"#aaa", lineHeight:1.4 }}>
                            {item.was}
                          </div>
                        </div>
                      ))}
                      {gruppe.beispiel && (
                        <div style={{ padding:"12px 14px", background:"#060606", borderTop:"1px solid #1a1a1a" }}>
                          <div style={{ fontSize:9, color:"#444", letterSpacing:2, marginBottom:6 }}>BEISPIEL</div>
                          <pre style={{
                            margin:0, fontFamily:"'Courier New',monospace",
                            fontSize:11, color:"#7aba7a", lineHeight:1.7, whiteSpace:"pre-wrap"
                          }}>{gruppe.beispiel}</pre>
                        </div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div style={{ maxWidth:900, margin:"0 auto", padding:"0 20px 32px", color:"#2a2a2a", fontSize:10, letterSpacing:1 }}>
            BrewStudy R Cheatsheet · HSWT Brau- & Getränketechnologie · Ziel: Statistik-Prüfung 1,0 🍺
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
